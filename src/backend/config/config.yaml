app:
  env: development
  port: "8080"
  debug: true
mongo:
  uri: "mongodb://admin:password@localhost:27017"
  db_name: "develop_agent"
redis:
  addr: "localhost:6379"
  password: ""
rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"
agent:
  channel_buffer_size: 10
  channel_drain_timeout: 30
auth:
  jwt_private_key_b64: ""
  jwt_issuer: "develop-agent"
  jwt_audience: "develop-agent-users"
  access_ttl_minutes: 15
  refresh_ttl_days: 7
seed:
  force_admin_reset: false
