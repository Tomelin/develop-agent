root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/api/main.go"
bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html", "yaml"]
exclude_dir = ["assets", "tmp", "vendor"]
delay = 1000

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[log]
time = false
